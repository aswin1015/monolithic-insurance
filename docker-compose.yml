version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mono-insurance-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mono-insurance
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Express API) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mono-insurance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mono-insurance
      JWT_SECRET: mono_insurance_super_secret_jwt_key_2024
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      UPLOAD_PATH: uploads/
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Seeder (runs once then exits) ────────────────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mono-insurance-seeder
    command: node src/seeders/seed.js
    environment:
      MONGO_URI: mongodb://mongo:27017/mono-insurance
      JWT_SECRET: mono_insurance_super_secret_jwt_key_2024
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - insurance-net
    restart: "no"

  # ─── Frontend (Vite → Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mono-insurance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - insurance-net

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

networks:
  insurance-net:
    driver: bridge
